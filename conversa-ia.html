<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tatusoft - Converse com nossa IA para estimar seu projeto digital.">
    <title>Conversa IA - tatusoft</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231B1915'/%3E%3C/svg%3E">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        .chat-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--papel);
        }

        /* Chat Header */
        .chat-header {
            flex: none;
            background: var(--grafite);
            color: var(--papel);
            padding: clamp(16px, 2vw, 24px) clamp(20px, 3vw, 32px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(27, 25, 21, 0.12);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(244, 241, 234, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(244, 241, 234, 0.2);
        }

        .chat-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: rgba(244, 241, 234, 0.7);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #25D366;
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: clamp(20px, 3vw, 32px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 840px;
            width: 100%;
            margin: 0 auto;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            flex: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 600;
        }

        .message.ai .message-avatar {
            background: var(--grafite);
            color: var(--papel);
        }

        .message.user .message-avatar {
            background: rgba(27, 25, 21, 0.08);
            color: var(--grafite);
        }

        .message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--pedra);
        }

        .message-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--grafite);
        }

        .message-text p {
            margin: 0 0 12px 0;
        }

        .message-text p:last-child {
            margin: 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--pedra);
            border-radius: 50%;
            animation: typing 1.4s ease infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .quick-action {
            padding: 10px 16px;
            background: var(--leite);
            border: 1px solid rgba(27, 25, 21, 0.12);
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-action:hover {
            background: var(--grafite);
            color: var(--papel);
            transform: translateY(-2px);
        }

        /* Estimate Card */
        .estimate-card {
            background: var(--leite);
            border: 1px solid rgba(27, 25, 21, 0.12);
            border-radius: 16px;
            padding: 24px;
            margin-top: 12px;
        }

        .estimate-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .estimate-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--grafite);
        }

        .estimate-badge {
            background: var(--grafite);
            color: var(--papel);
            padding: 6px 12px;
            border-radius: 999px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .estimate-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .estimate-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .estimate-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--pedra);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .estimate-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--grafite);
            letter-spacing: -0.02em;
        }

        /* Input Area */
        .chat-input-area {
            flex: none;
            padding: clamp(16px, 2vw, 24px) clamp(20px, 3vw, 32px);
            background: var(--leite);
            border-top: 1px solid rgba(27, 25, 21, 0.12);
        }

        .chat-input-container {
            max-width: 840px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            min-height: 48px;
            max-height: 120px;
            padding: 12px 16px;
            background: white;
            border: 1.5px solid var(--grafite);
            border-radius: 12px;
            font-family: 'Archivo', system-ui, sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .chat-input:focus {
            box-shadow: 0 0 0 2px rgba(27, 25, 21, 0.1);
        }

        .send-btn {
            flex: none;
            width: 48px;
            height: 48px;
            background: var(--grafite);
            color: var(--papel);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .chat-container {
                padding: 16px;
            }

            .estimate-details {
                grid-template-columns: 1fr;
            }

            .chat-input-container {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <a href="index.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>
                <div>
                    <div class="chat-title">Estimador de Projetos</div>
                    <div class="chat-status">
                        <span class="status-dot"></span>
                        <span data-pt="IA online" data-en="AI online">IA online</span>
                    </div>
                </div>
            </div>
            <button class="lang-switch" aria-label="alternar idioma">
                <span class="lang-pt active">pt</span>
                <span class="lang-divider"> · </span>
                <span class="lang-en">en</span>
            </button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome Message -->
            <div class="message ai">
                <div class="message-avatar">IA</div>
                <div class="message-content">
                    <div class="message-name">tatusoft IA</div>
                    <div class="message-text">
                        <p data-pt="Oi! Sou a IA da tatusoft. Vou te ajudar a estimar tempo e investimento para seu projeto digital." data-en="Hi! I'm tatusoft's AI. I'll help you estimate time and investment for your digital project.">
                            Oi! Sou a IA da tatusoft. Vou te ajudar a estimar tempo e investimento para seu projeto digital.
                        </p>
                        <p data-pt="Me conta: o que você quer construir? Pode ser uma ideia inicial, um problema que precisa resolver, ou um projeto já estruturado." data-en="Tell me: what do you want to build? It can be an initial idea, a problem that needs solving, or an already structured project.">
                            Me conta: o que você quer construir? Pode ser uma ideia inicial, um problema que precisa resolver, ou um projeto já estruturado.
                        </p>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-action" onclick="sendQuickMessage('App mobile')" data-pt="App mobile" data-en="Mobile app">App mobile</button>
                        <button class="quick-action" onclick="sendQuickMessage('Sistema web')" data-pt="Sistema web" data-en="Web system">Sistema web</button>
                        <button class="quick-action" onclick="sendQuickMessage('E-commerce')" data-pt="E-commerce" data-en="E-commerce">E-commerce</button>
                        <button class="quick-action" onclick="sendQuickMessage('Dashboard')" data-pt="Dashboard" data-en="Dashboard">Dashboard</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="chat-input-container">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="Digite sua mensagem..."
                    data-placeholder-pt="Digite sua mensagem..."
                    data-placeholder-en="Type your message..."
                    rows="1"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Auto-resize textarea
        const chatInput = document.getElementById('chatInput');
        const chatContainer = document.getElementById('chatContainer');

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send message on Enter (without Shift)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send message function
        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage('user', message, 'Você');

            // Clear input
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // Show typing indicator
            showTypingIndicator();

            // Simulate AI response
            setTimeout(() => {
                removeTypingIndicator();
                generateAIResponse(message);
            }, 2000);
        }

        // Quick message sender
        function sendQuickMessage(text) {
            chatInput.value = text;
            sendMessage();
        }

        // Add message to chat
        function addMessage(type, text, name) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${type === 'ai' ? 'IA' : 'Você'}</div>
                <div class="message-content">
                    <div class="message-name">${name}</div>
                    <div class="message-text">${text}</div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show typing indicator
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing-message';
            typingDiv.innerHTML = `
                <div class="message-avatar">IA</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const typingMessage = document.querySelector('.typing-message');
            if (typingMessage) {
                typingMessage.remove();
            }
        }

        // Generate AI response
        function generateAIResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            let response = '';
            let showEstimate = false;

            if (lowerMessage.includes('app') || lowerMessage.includes('mobile')) {
                response = `
                    <p>Entendi! Um app mobile é uma excelente escolha para alcançar seus usuários.</p>
                    <p>Baseado no que você descreveu, aqui está uma estimativa inicial para seu projeto:</p>
                `;
                showEstimate = true;
            } else if (lowerMessage.includes('e-commerce') || lowerMessage.includes('loja')) {
                response = `
                    <p>Um e-commerce! Vamos construir uma loja digital que converte.</p>
                    <p>Com base nas funcionalidades típicas de um e-commerce, preparei esta estimativa:</p>
                `;
                showEstimate = true;
            } else if (lowerMessage.includes('sistema') || lowerMessage.includes('web')) {
                response = `
                    <p>Sistema web, perfeito! Vamos criar algo robusto e escalável.</p>
                    <p>Analisando as características de um sistema web completo:</p>
                `;
                showEstimate = true;
            } else {
                response = `
                    <p>Interessante! Para te dar uma estimativa mais precisa, me conta um pouco mais:</p>
                    <p>• Quem vai usar este produto?<br>
                    • Qual problema principal ele resolve?<br>
                    • Tem alguma referência de algo similar?</p>
                `;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.innerHTML = `
                <div class="message-avatar">IA</div>
                <div class="message-content">
                    <div class="message-name">tatusoft IA</div>
                    <div class="message-text">${response}</div>
                    ${showEstimate ? `
                        <div class="estimate-card">
                            <div class="estimate-header">
                                <div class="estimate-title">Estimativa do Projeto</div>
                                <div class="estimate-badge">MVP</div>
                            </div>
                            <div class="estimate-details">
                                <div class="estimate-item">
                                    <div class="estimate-label">Investimento</div>
                                    <div class="estimate-value">R$ 45-80k</div>
                                </div>
                                <div class="estimate-item">
                                    <div class="estimate-label">Prazo</div>
                                    <div class="estimate-value">8-12 sem</div>
                                </div>
                                <div class="estimate-item">
                                    <div class="estimate-label">Time</div>
                                    <div class="estimate-value">2-3 devs</div>
                                </div>
                            </div>
                        </div>
                        <div class="quick-actions">
                            <button class="quick-action" onclick="sendQuickMessage('Quero mais detalhes')">Mais detalhes</button>
                            <button class="quick-action" onclick="sendQuickMessage('Vamos conversar')">Agendar conversa</button>
                            <button class="quick-action" onclick="sendQuickMessage('Tenho outras dúvidas')">Outras dúvidas</button>
                        </div>
                    ` : `
                        <div class="quick-actions">
                            <button class="quick-action" onclick="sendQuickMessage('É um marketplace')">Marketplace</button>
                            <button class="quick-action" onclick="sendQuickMessage('Sistema interno')">Sistema interno</button>
                            <button class="quick-action" onclick="sendQuickMessage('Aplicativo de serviços')">App de serviços</button>
                        </div>
                    `}
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Scroll to bottom of chat
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Load initial idea from localStorage if available
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const ideia = urlParams.get('ideia') || localStorage.getItem('tatu-ideia');

            if (ideia) {
                setTimeout(() => {
                    chatInput.value = ideia;
                    sendMessage();
                }, 1000);
            }
        });
    </script>

    <!-- Include main JS for language switching -->
    <script src="js/main.js"></script>
</body>
</html>
